<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather Icons Simple</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔍 SEARCH -->
<input id="searchBox" placeholder="Search city..." />
<button id="locBtn">📍</button>

<!-- ⏳ LOADING / ERROR -->
<div id="loading">Loading...</div>
<div id="error"></div>

<!-- 🔝 CURRENT WEATHER -->
<h1 id="city">Kota</h1>
<p id="condition">Clear</p>
<h1 id="temp">35°C</h1>

<!-- 🔥 YOUR ORIGINAL DESIGN (UNCHANGED) -->

<div class="hot">
  <span class="sun"></span>
  <span class="sunx"></span>
</div>

<div class="cloudy">
  <span class="cloud"></span>
  <span class="cloudx"></span>
</div>

<div class="stormy">
  <ul>
    <li></li><li></li><li></li><li></li>
    <li></li><li></li><li></li><li></li>
  </ul>
  <span class="snowe"></span>
  <span class="snowex"></span>
  <span class="stick"></span>
  <span class="stick2"></span>
</div>

<div class="breezy">
  <ul>
    <li></li><li></li><li></li><li></li><li></li>
  </ul>
  <span class="cloudr"></span>
</div>

<div class="night">
  <span class="moon"></span>
  <span class="spot1"></span>
  <span class="spot2"></span>
  <ul>
    <li></li><li></li><li></li><li></li><li></li>
  </ul>
</div>

<!-- 🔽 FORECAST -->
<div class="forecast">
  <div class="day"></div>
  <div class="day"></div>
  <div class="day"></div>
  <div class="day"></div>
  <div class="day"></div>
</div>

<!-- 🔻 FOOTER -->
<div class="footer">
  <p>Weather UI Design</p>
  <div class="logos">
    🌞 ☁️ 🌩️ 🌬️ 🌙
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
