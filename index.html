<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔝 CURRENT WEATHER -->
<div class="current">
  <h1 id="city">Kota</h1>
  <h2 id="temp">32°C</h2>
  <p id="condition">Sunny</p>

  <!-- YOUR ORIGINAL ICON -->
  <div class="hot">
    <span class="sun"></span>
    <span class="sunx"></span>
  </div>
</div>

<!-- 🔽 FORECAST -->
<div class="forecast">

  <div class="day">
    <p>Tomorrow</p>
    <div class="cloudy">
      <span class="cloud"></span>
      <span class="cloudx"></span>
    </div>
    <p>30°C</p>
  </div>

  <div class="day">
    <p>Day 2</p>
    <div class="stormy">
      <ul>
        <li></li><li></li><li></li><li></li>
      </ul>
      <span class="stick"></span>
      <span class="stick2"></span>
    </div>
    <p>28°C</p>
  </div>

  <div class="day">
    <p>Day 3</p>
    <div class="breezy">
      <ul>
        <li></li><li></li><li></li>
      </ul>
      <span class="cloudr"></span>
    </div>
    <p>29°C</p>
  </div>

</div>

<!-- 🔻 LOGOS / UI -->
<div class="footer">
  <p>Powered by Weather API</p>
  <div class="logos">
    <span>🌞</span>
    <span>☁️</span>
    <span>🌩️</span>
    <span>🌙</span>
  </div>
</div>

</body>
</html>
